    - data:
        code: "import json\n\n\ndef main(games_data: list, prices_data: list) -> dict:\n\
          \    \"\"\"\n    将 SQL 查询结果转换为 HTML 表格\n    支持 Dify SQL Execute 节点的多种输出格式\n\
          \    \"\"\"\n    \n    def extract_rows(data):\n        \"\"\"递归提取数据行，兼容多种\
          \ Dify 输出格式\"\"\"\n        rows = []\n        \n        if not data:\n \
          \           return rows\n        \n        # 如果是列表，遍历每个元素\n        if isinstance(data,\
          \ list):\n            for item in data:\n                rows.extend(extract_rows(item))\n\
          \            return rows\n        \n        # 如果是字典\n        if isinstance(data,\
          \ dict):\n            # 1. 如果有 result 字段（SQL Execute 标准输出）\n           \
          \ if \"result\" in data:\n                result = data[\"result\"]\n  \
          \              if isinstance(result, list):\n                    rows.extend(result)\n\
          \                elif isinstance(result, dict):\n                    rows.append(result)\n\
          \            # 2. 如果有 data 字段（某些版本）\n            elif \"data\" in data:\n\
          \                data_field = data[\"data\"]\n                if isinstance(data_field,\
          \ list):\n                    rows.extend(data_field)\n                elif\
          \ isinstance(data_field, dict):\n                    rows.append(data_field)\n\
          \            # 3. 如果有 text 字段（SQL 执行结果描述），忽略\n            elif \"text\"\
          \ in data:\n                # text 是执行结果描述，不是数据，跳过\n                pass\n\
          \            # 4. 如果字典本身看起来像一条数据记录（有 name 字段等）\n            elif \"name\"\
          \ in data or \"appid\" in data:\n                rows.append(data)\n   \
          \         # 5. 如果字典包含其他可能的数据字段，尝试直接提取\n            else:\n             \
          \   # 尝试提取所有值中可能是列表的部分\n                for key, value in data.items():\n\
          \                    if isinstance(value, list) and value:\n           \
          \             rows.extend(extract_rows(value))\n        \n        return\
          \ rows\n\n    # 提取游戏数据\n    games = extract_rows(games_data) if games_data\
          \ else []\n    prices = extract_rows(prices_data) if prices_data else []\n\
          \n    # 去重（防止重复数据）\n    unique_games = []\n    seen = set()\n    for g in\
          \ games:\n        key = (g.get(\"name\", \"\"), g.get(\"release_date\",\
          \ \"\"))\n        if key not in seen:\n            seen.add(key)\n     \
          \       unique_games.append(g)\n    games = unique_games\n\n    # === 生成游戏列表\
          \ HTML ===\n    game_cols = [\"name\", \"release_date\", \"developer\",\
          \ \"publisher\", \"genres\", \"summary\"]\n    game_cn = [\"游戏名\", \"发售日期\"\
          , \"开发商\", \"发行商\", \"类型\", \"简介\"]\n\n    html = \"<h3>游戏列表</h3>\"\n  \
          \  if games:\n        html += f\"<p>共 {len(games)} 款游戏</p>\"\n        html\
          \ += \"<table border='1' style='border-collapse:collapse;width:100%;font-size:14px;'>\"\
          \n        html += \"<tr style='background-color:#f0f0f0;'>\"\n        html\
          \ += \"<th>序号</th>\" + \"\".join(f\"<th style='padding:8px;text-align:left;'>{c}</th>\"\
          \ for c in game_cn) + \"</tr>\"\n        \n        for idx, row in enumerate(games,\
          \ 1):\n            bgcolor = \"#f9f9f9\" if idx % 2 == 0 else \"#ffffff\"\
          \n            html += f\"<tr style='background-color:{bgcolor};'>\"\n  \
          \          html += f\"<td style='padding:6px;'>{idx}</td>\"\n          \
          \  for c in game_cols:\n                val = row.get(c, '')\n         \
          \       if val is None:\n                    val = ''\n                #\
          \ 截断过长的简介\n                if c == \"summary\" and len(str(val)) > 100:\n\
          \                    val = str(val)[:100] + \"...\"\n                html\
          \ += f\"<td style='padding:6px;'>{val}</td>\"\n            html += \"</tr>\"\
          \n        html += \"</table>\"\n    else:\n        html += \"<p>暂无游戏数据</p>\"\
          \n\n    # === 生成价格列表 HTML ===\n    price_cols = [\"name\", \"currency\"\
          , \"initial_price\", \"final_price\", \"discount_percent\", \"recorded_at\"\
          ]\n    price_cn = [\"游戏名\", \"货币\", \"原价\", \"现价\", \"折扣\", \"记录时间\"]\n\n\
          \    html += \"<h3>价格记录</h3>\"\n    if prices:\n        html += f\"<p>共\
          \ {len(prices)} 条价格记录</p>\"\n        html += \"<table border='1' style='border-collapse:collapse;width:100%;font-size:14px;'>\"\
          \n        html += \"<tr style='background-color:#f0f0f0;'>\"\n        html\
          \ += \"<th>序号</th>\" + \"\".join(f\"<th style='padding:8px;text-align:left;'>{c}</th>\"\
          \ for c in price_cn) + \"</tr>\"\n        \n        for idx, row in enumerate(prices,\
          \ 1):\n            bgcolor = \"#f9f9f9\" if idx % 2 == 0 else \"#ffffff\"\
          \n            html += f\"<tr style='background-color:{bgcolor};'>\"\n  \
          \          html += f\"<td style='padding:6px;'>{idx}</td>\"\n          \
          \  for c in price_cols:\n                val = row.get(c, '')\n        \
          \        if val is None:\n                    val = ''\n               \
          \ if c == \"discount_percent\" and val:\n                    # 折扣显示为百分比\n\
          \                    html += f\"<td style='padding:6px;color:green;font-weight:bold;'>{val}%</td>\"\
          \n                elif c == \"currency\":\n                    html += f\"\
          <td style='padding:6px;'>{val}</td>\"\n                else:\n         \
          \           html += f\"<td style='padding:6px;'>{val}</td>\"\n         \
          \   html += \"</tr>\"\n        html += \"</table>\"\n    else:\n       \
          \ html += \"<p>暂无价格数据</p>\"\n\n    return {\"html\": html}"
        code_language: python3
