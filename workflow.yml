    - data:
        code: "import json\nimport urllib.request\nimport ssl\nfrom datetime import\
          \ datetime, timezone, timedelta\n\n\ndef main(summary: str = \"\", steam_games:\
          \ str = \"\", epic_games: str = \"\", webhook_key: str =\n\"31aeb7ca-7aed-4767-8826-9cba80664379\"\
          , **_kwargs) -> dict:\n    if not webhook_key:\n        return {\"status\"\
          : \"skipped\", \"message\": \"未配置 webhook_key\"}\n\n    url = f\"https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key={webhook_key}\"\
          \n\n    all_games = []\n    for src in [steam_games, epic_games]:\n    \
          \    if src:\n            try:\n                if isinstance(src, str):\n\
          \                    names = json.loads(src)\n                else:\n  \
          \                  names = src\n                all_games.extend(names)\n\
          \            except:\n                pass\n\n    if all_games:\n      \
          \  games_lines = \"\\n\".join(f\"{i}. {g}\" for i, g in enumerate(all_games[:30],\
          \ 1))\n    else:\n        games_lines = \"无\"\n\n    push_time = datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=8))).strftime(\"\
          %Y-%m-%d %H:%M:%S\")\n\n    content = (\n        f\"## 游戏数据同步日报\\n\"\n \
          \       f\"**推送时间**：{push_time}\\n\"\n        f\"{summary}\\n\"\n      \
          \  f\"\\n**本次游戏**：\\n\"\n        f\"{games_lines}\"\n    )\n\n    body =\
          \ {\"msgtype\": \"markdown\", \"markdown\": {\"content\": content}}\n\n\
          \    ctx = ssl.create_default_context()\n    ctx.check_hostname = False\n\
          \    ctx.verify_mode = ssl.CERT_NONE\n    handler = urllib.request.HTTPSHandler(context=ctx)\n\
          \    opener = urllib.request.build_opener(handler)\n\n    try:\n       \
          \ data = json.dumps(body).encode(\"utf-8\")\n        req = urllib.request.Request(url,\
          \ data=data, headers={\"Content-Type\": \"application/json\"}, method=\"\
          POST\")\n        with opener.open(req, timeout=15) as resp:\n          \
          \  resp_body = resp.read().decode(\"utf-8\")\n    except Exception as e:\n\
          \        return {\"status\": \"error\", \"message\": str(e)}\n\n    return\
          \ {\"status\": \"success\", \"message\": resp_body}"
