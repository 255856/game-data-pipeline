    - data:
        code: "import json\nimport re\nfrom datetime import datetime, timezone, timedelta\n\
          \n\ndef main(steam_count=None, steam_source: str = \"\", steam_sql: str\
          \ = \"\",\n         epic_count=None, epic_source: str = \"\", epic_sql:\
          \ str = \"\",\n         steam_prices_sql: str = \"\", epic_prices_sql: str\
          \ = \"\") -> dict:\n    now = datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=8))).strftime(\"\
          %Y-%m-%d %H:%M:%S\")\n\n    steam_count = steam_count or 0\n    epic_count\
          \ = epic_count or 0\n\n    def get_affected(sql_result):\n        if not\
          \ sql_result:\n            return 0\n        try:\n            text = \"\
          \"\n            if isinstance(sql_result, str):\n                try:\n\
          \                    sr = json.loads(sql_result)\n                    text\
          \ = sr.get(\"text\", \"\")\n                except:\n                  \
          \  text = sql_result\n            else:\n                text = sql_result.get(\"\
          text\", \"\")\n            m = re.search(r\"Affected rows:\\s*(\\d+)\",\
          \ text)\n            return int(m.group(1)) if m else 0\n        except:\n\
          \            return 0\n\n    steam_games_affected = get_affected(steam_sql)\n\
          \    steam_prices_affected = get_affected(steam_prices_sql)\n    epic_games_affected\
          \ = get_affected(epic_sql)\n    epic_prices_affected = get_affected(epic_prices_sql)\n\
          \n    steam_total = steam_games_affected + steam_prices_affected\n    epic_total\
          \ = epic_games_affected + epic_prices_affected\n    total_discovery = steam_count\
          \ + epic_count\n    total_affected = steam_total + epic_total\n\n    sources\
          \ = []\n    if steam_count > 0:\n        sources.append(steam_source)\n\
          \    if epic_count > 0:\n        sources.append(epic_source)\n\n    html\
          \ = f\"\"\"\n<h2>游戏数据同步日报</h2>\n<table border='1' style='border-collapse:collapse;width:500px'>\n\
          \  <tr><td>执行时间</td><td>{now}</td></tr>\n  <tr><td>数据来源</td><td>{', '.join(sources)\
          \ if sources else '无'}</td></tr>\n  <tr><td>Steam</td><td>发现 {steam_count}\
          \ 款 / 游戏入库 {steam_games_affected} 行 / 价格入库 {steam_prices_affected}\n行</td></tr>\n\
          \  <tr><td>Epic</td><td>发现 {epic_count} 款 / 游戏入库 {epic_games_affected} 行\
          \ / 价格入库 {epic_prices_affected}\n行</td></tr>\n  <tr><td>合计</td><td>发现 {total_discovery}\
          \ 款 / 入库 {total_affected} 行</td></tr>\n</table>\n    \"\"\".strip()\n\n\
          \    summary = (\n        \n        f\"Steam: 发现{steam_count}款 / 游戏入库{steam_games_affected}行\
          \ / 价格入库{steam_prices_affected}行\\n\"\n        f\"Epic: 发现{epic_count}款\
          \ / 游戏入库{epic_games_affected}行 / 价格入库{epic_prices_affected}行\\n\"\n    \
          \    f\"合计: 发现{total_discovery}款 / 入库{total_affected}行\"\n    )\n\n    return\
          \ {\n        \"html\": html,\n        \"summary\": summary,\n        \"\
          discovery_count\": total_discovery,\n        \"affected_rows\": total_affected,\n\
          \    }"
