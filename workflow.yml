          : 0,\n    \"has_price\": False,\n}\n\n\ndef main(appid: int) -> dict:\n\
          \    time.sleep(random.uniform(2, 5))\n\n    url = f\"https://store.steampowered.com/api/appdetails?appids={appid}&cc=cn\"\
          \n    headers = {\n        \"User-Agent\": \"Mozilla/5.0 (Windows NT 10.0;\
          \ Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36\"\
          ,\n        \"Accept\": \"application/json\",\n        \"Accept-Language\"\
          : \"zh-CN,zh;q=0.9\",\n        \"Accept-Encoding\": \"gzip, deflate\",\n\
          \    }\n\n    ctx = ssl.create_default_context()\n    ctx.check_hostname\
          \ = False\n    ctx.verify_mode = ssl.CERT_NONE\n\n    https_handler = urllib.request.HTTPSHandler(context=ctx)\n\
          \    proxy_handler = urllib.request.ProxyHandler({})\n    opener = urllib.request.build_opener(https_handler,\
          \ proxy_handler)\n\n    for attempt in range(2):\n        try:\n       \
          \     req = urllib.request.Request(url, headers=headers)\n            with\
          \ opener.open(req, timeout=40) as resp:\n                raw = resp.read()\n\
          \                if resp.headers.get(\"Content-Encoding\") == \"gzip\":\n\
          \                    raw = gzip.decompress(raw)\n                full =\
          \ json.loads(raw.decode(\"utf-8\"))\n                game = full[str(appid)]\n\
          \                if not game.get(\"success\"):\n                    return\
          \ {**_EMPTY, \"status\": \"error\", \"message\": \"游戏未找到\"}\n          \
          \      d = game[\"data\"]\n                devs = d.get(\"developers\")\
          \ or []\n                pubs = d.get(\"publishers\") or []\n\n        \
          \        # 提取价格信息 (Steam 价格单位是\"分\"，除以100)\n                price_info =\
