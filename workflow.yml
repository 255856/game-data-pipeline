          \ '')}\\n\"\n                    f\"Steam ID: {d.get('steam_appid', '')}\\\
          n\"\n                    f\"开发商: {', '.join(devs)}\\n\"\n              \
          \      f\"发行商: {', '.join(pubs)}\\n\"\n                    f\"发售日期: {d.get('release_date',\
          \ {}).get('date', '')}\\n\"\n                    f\"价格: {currency} {final}\
          \ (原价 {initial}) 折扣 {discount}%\\n\"\n                    f\"简介: {d.get('short_description',\
          \ '')}\"\n                )\n                return {\n                \
          \    \"name\": d.get(\"name\"),\n                    \"appid\": d.get(\"\
          steam_appid\"),\n                    \"developers\": devs,\n           \
          \         \"publishers\": pubs,\n                    \"short_desc\": d.get(\"\
          short_description\"),\n                    \"release_date\": d.get(\"release_date\"\
          , {}).get(\"date\"),\n                    \"status\": \"success\",\n   \
          \                 \"message\": \"\",\n                    \"info\": info,\n\
          \                    \"price_currency\": currency,\n                   \
          \ \"price_initial\": initial,\n                    \"price_final\": final,\n\
          \                    \"price_discount\": discount,\n                   \
          \ \"has_price\": currency != \"\",\n                }\n\n        except\
          \ urllib.error.HTTPError as e:\n            if e.code == 429 and attempt\
          \ == 0:\n                time.sleep(5)\n                continue\n     \
          \       return {**_EMPTY, \"status\": \"error\", \"message\": f\"HTTP {e.code}\"\
          , \"info\": \"\"}\n        except urllib.error.URLError as e:\n        \
