          result\", [])\n        \n        # 判断是否有数据\n        has_data = len(result)\
          \ > 0\n        \n        # 提取数据\n        appid = None\n        name = None\n\
          \        \n        if has_data:\n            game_data = result[0]\n   \
          \         appid = game_data.get(\"appid\")\n            name = game_data.get(\"\
          name\")\n        \n        return {\n            \"appid\": appid,\n   \
          \         \"name\": name,\n            \"has_data\": has_data\n        }\n\
          \        \n    except Exception as e:\n        return {\n            \"\
          appid\": None,\n            \"name\": None,\n            \"has_data\": False,\n\
          \            \"error\": str(e)\n        }"
