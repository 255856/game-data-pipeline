    - data:
        code: "import json\n\ndef main(raw: str) -> dict:\n    try:\n        obj =\
          \ json.loads(raw) if isinstance(raw, str) else raw\n    except:\n      \
          \  return {\"info\": raw if raw else \"\"}\n\n    parts = []\n    results\
          \ = obj.get(\"results\", [])\n    for r in results[:3]:\n        title =\
          \ r.get(\"title\", \"\")\n        content = r.get(\"content\", \"\")\n \
          \       if content:\n            parts.append(f\"标题: {title}\\n内容: {content[:500]}\"\
          )\n\n    return {\"info\": \"\\n\\n\".join(parts) if parts else \"\"}"
