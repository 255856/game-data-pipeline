    - data:
        code: "import re\n\n\ndef main(outputs: list) -> dict:\n    games_values =\
          \ []\n    games_prefix = \"\"\n    prices_values = []\n    prices_prefix\
          \ = \"\"\n\n    for s in outputs:\n        s = s.strip()\n        if not\
          \ s or \"SKIP\" in s:\n            continue\n\n        # 按每个 INSERT 语句拆分（用\
          \ ; 分割后再拼回）\n        # 先按 ;\\n 或 ; 拆成多个独立的 SQL 语句\n        statements =\
          \ re.split(r';\\s*\\n', s)\n\n        for stmt in statements:\n        \
          \    stmt = stmt.strip()\n            if not stmt or not stmt.upper().startswith(\"\
          INSERT\"):\n                continue\n            # 去掉可能的 ON DUPLICATE KEY\
          \ UPDATE\n            stmt = re.sub(r\"\\s+ON\\s+DUPLICATE\\s+KEY\\s+UPDATE\\\
          s+.*$\", \"\", stmt, flags=re.IGNORECASE |\n                           \
          \                                                          re.DOTALL).strip()\n\
          \            if not stmt.endswith(\";\"):\n                stmt += \";\"\
          \n\n            m = re.match(r\"(INSERT\\s+(?:IGNORE\\s+)?INTO\\s+(\\w+)\\\
          s*\\([^)]+\\))\\s*VALUES\\s*(\\(.+\\))\\s*;\", stmt,\n                 \
          \        re.IGNORECASE | re.DOTALL)\n            if m:\n               \
          \ table_name = m.group(2).lower()\n                if table_name == \"games\"\
          :\n                    games_prefix = m.group(1)\n                    games_values.append(m.group(3))\n\
          \                elif table_name == \"game_prices\":\n                 \
          \   prices_prefix = m.group(1)\n                    prices_values.append(m.group(3))\n\
          \n    games_sql = \"\"\n    prices_sql = \"\"\n    games_count = 0\n   \
          \ prices_count = 0\n\n    if games_values:\n        prefix = re.sub(r\"\
          INSERT\\s+IGNORE\\s+INTO\", \"INSERT INTO\", games_prefix, flags=re.IGNORECASE)\n\
          \        games_sql = f\"{prefix} VALUES {', '.join(games_values)} ON DUPLICATE\
          \ KEY UPDATE release_date = VALUES(release_date), developer = VALUES(developer),\
          \ publisher = VALUES(publisher), genres = VALUES(genres),summary = VALUES(summary);\"\
          \n        games_count = len(games_values)\n\n    if prices_values:\n   \
          \     # 把 appid=NULL 或 appid=0 替换为 0\n        fixed_values = []\n      \
          \  for v in prices_values:\n            v = re.sub(r'\\(\\s*NULL\\s*,',\
          \ '(0,', v, flags=re.IGNORECASE)\n            fixed_values.append(v)\n \
          \       prefix = re.sub(r\"INSERT\\s+IGNORE\\s+INTO\", \"INSERT INTO\",\
          \ prices_prefix, flags=re.IGNORECASE)\n        prices_sql = f\"{prefix}\
          \ VALUES {', '.join(fixed_values)} ON DUPLICATE KEY UPDATE initial_price\
          \ = VALUES(initial_price), final_price = VALUES(final_price), discount_percent\
          \ = VALUES(discount_percent);\"\n        prices_count = len(fixed_values)\n\
          \n    return {\n        \"games_count\": games_count,\n        \"prices_count\"\
          : prices_count,\n        \"games_sql\": games_sql,\n        \"prices_sql\"\
          : prices_sql,\n    }"
        code_language: python3
