    - data:
        code: "import json\nimport urllib.request\nimport urllib.error\nimport ssl\n\
          import gzip\nimport re\nimport time\nimport xml.etree.ElementTree as ET\n\
          \n\ndef main(last_run_date: str = \"\") -> dict:\n    ctx = ssl.create_default_context()\n\
          \    ctx.check_hostname = False\n    ctx.verify_mode = ssl.CERT_NONE\n \
          \   https_handler = urllib.request.HTTPSHandler(context=ctx)\n    proxy_handler\
          \ = urllib.request.ProxyHandler({})\n    opener = urllib.request.build_opener(https_handler,\
          \ proxy_handler)\n    base_headers = {\n        \"User-Agent\": \"Mozilla/5.0\
          \ (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko)Chrome/120.0.0.0\
          \ Safari/537.36\",\"Accept-Language\": \"zh-CN,zh;q=0.9\",\n    }\n\n  \
          \  game_names = []\n    sources = []\n    error_msg = \"\"\n\n    # 来源1:\
          \ Steam RSS 新品 (最稳定, 带appid, 2次重试)\n    for retry in range(2):\n       \
          \ try:\n            rss_headers = {**base_headers, \"Accept\": \"application/xml,\
          \ text/xml, */*\"}\n            req = urllib.request.Request(\n        \
          \        \"https://store.steampowered.com/feeds/newreleases.xml?cc=cn\"\
          ,\n                headers=rss_headers\n            )\n            with\
          \ opener.open(req, timeout=30) as resp:\n                raw = resp.read()\n\
          \                if resp.headers.get(\"Content-Encoding\") == \"gzip\":\n\
          \                    raw = gzip.decompress(raw)\n                content\
          \ = raw.decode(\"utf-8\", errors=\"ignore\")\n                root = ET.fromstring(content)\n\
          \                for item in root.findall(\".//item\"):\n              \
          \      title_el = item.find(\"title\")\n                    desc_el = item.find(\"\
          description\")\n                    title_text = title_el.text if title_el\
          \ is not None else \"\"\n                    desc_text = desc_el.text if\
          \ desc_el is not None else \"\"\n                    appid_m = re.search(r\"\
          /app/(\\d+)/\", desc_text)\n                    name = title_text\n    \
          \                for prefix in [\"Now Available on Steam - \", \"Now Available\
          \ - \"]:\n                        if name.startswith(prefix):\n        \
          \                    name = name[len(prefix):]\n                    name\
          \ = re.sub(r\", \\d+% off!$\", \"\", name).strip()\n                   \
          \ if \"DLC Available\" in title_text or \"Soundtrack\" in title_text:\n\
          \                        continue\n                    if appid_m and name\
          \ and name not in game_names:\n                        game_names.append(name)\n\
          \                if game_names:\n                    sources.append(\"steam_rss\"\
          )\n                    break\n        except Exception as e:\n         \
          \   if retry == 0:\n                time.sleep(2)\n            else:\n \
          \               error_msg += f\"rss: {type(e).__name__}; \"\n\n    time.sleep(1)\n\
          \n    # 来源2: Steam 热门新品 HTML\n    try:\n        html_headers = {**base_headers,\
          \ \"Accept\": \"text/html,application/xhtml+xml\"}\n        req = urllib.request.Request(\n\
          \            \"https://store.steampowered.com/search/?filter=popularnew&cc=cn&ndl=1\"\
          ,\n            headers=html_headers\n        )\n        with opener.open(req,\
          \ timeout=15) as resp:\n            raw = resp.read()\n            if resp.headers.get(\"\
          Content-Encoding\") == \"gzip\":\n                raw = gzip.decompress(raw)\n\
          \            html = raw.decode(\"utf-8\", errors=\"ignore\")\n         \
          \   names = re.findall(r'<span class=\"title\">([^<]+)</span>', html)\n\
          \            for name in names:\n                name = name.strip()\n \
          \               if name and name not in game_names:\n                  \
          \  game_names.append(name)\n            sources.append(\"steam_popular_new\"\
          )\n    except Exception as e:\n        error_msg += f\"popular: {type(e).__name__};\
          \ \"\n\n    time.sleep(1)\n\n    # 来源3: Steam Featured API\n    try:\n \
          \       api_headers = {**base_headers, \"Accept\": \"application/json\"\
          }\n        req = urllib.request.Request(\n            \"https://store.steampowered.com/api/featuredcategories?cc=cn\"\
          ,\n            headers=api_headers\n        )\n        with opener.open(req,\
          \ timeout=15) as resp:\n            raw = resp.read()\n            if resp.headers.get(\"\
          Content-Encoding\") == \"gzip\":\n                raw = gzip.decompress(raw)\n\
          \            data = json.loads(raw.decode(\"utf-8\"))\n            for category\
          \ in [\"new_releases\", \"top_sellers\", \"specials\", \"coming_soon\"]:\n\
          \                items = data.get(category, {}).get(\"items\", [])\n   \
          \             for item in items[:3]:\n                    name = item.get(\"\
          name\", \"\").strip()\n                    if name and name not in game_names:\n\
          \                        game_names.append(name)\n            sources.append(\"\
          steam_featured\")\n    except Exception as e:\n        error_msg += f\"\
          featured: {type(e).__name__}; \"\n\n    # 来源4: Steam 即将推出 HTML\n    try:\n\
          \        html_headers = {**base_headers, \"Accept\": \"text/html,application/xhtml+xml\"\
          }\n        req = urllib.request.Request(\n            \"https://store.steampowered.com/search/?filter=comingsoon&cc=cn&ndl=1\"\
          ,\n            headers=html_headers\n        )\n        with opener.open(req,\
          \ timeout=15) as resp:\n            raw = resp.read()\n            if resp.headers.get(\"\
          Content-Encoding\") == \"gzip\":\n                raw = gzip.decompress(raw)\n\
          \            html = raw.decode(\"utf-8\", errors=\"ignore\")\n         \
