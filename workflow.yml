    - data:
        code: "def main(sql_output: list) -> dict:\n    \"\"\"\n    从 SQL 查询结果中提取\
          \ appid 和 name\n    输入格式: [{\"result\": [{\"appid\": 730}]}]\n    \"\"\"\
          \n    try:\n        # sql_output 是一个数组，取第一个元素\n        if not sql_output\
          \ or len(sql_output) == 0:\n            return {\n                \"appid\"\
          : None,\n                \"name\": None,\n                \"has_data\":\
          \ False\n            }\n        \n        # 取第一个元素\n        first_item =\
          \ sql_output[0]\n        \n        # 获取 result 数组\n        result = first_item.get(\"\
          result\", [])\n        \n        # 判断是否有数据\n        has_data = len(result)\
          \ > 0\n        \n        # 提取数据\n        appid = None\n        name = None\n\
          \        \n        if has_data:\n            game_data = result[0]\n   \
          \         appid = game_data.get(\"appid\")\n            name = game_data.get(\"\
          name\")\n        \n        return {\n            \"appid\": appid,\n   \
          \         \"name\": name,\n            \"has_data\": has_data\n        }\n\
          \        \n    except Exception as e:\n        return {\n            \"\
          appid\": None,\n            \"name\": None,\n            \"has_data\": False,\n\
          \            \"error\": str(e)\n        }"
        code_language: python3
        isInIteration: true
        isInLoop: false
        iteration_id: '1783218214352'
        outputs:
          appid:
            children: null
            type: number
          has_data:
            children: null
            type: boolean
          name:
            children: null
            type: string
        selected: false
        title: 格式转换_1
        type: code
        variables:
        - value_selector:
          - '1783225297746'
